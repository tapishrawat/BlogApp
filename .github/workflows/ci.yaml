name: BlogApp DevSecOps Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/blogapp-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/blogapp-frontend

jobs:
# Stage 1 - Lint Stage
  lint:
    name: "Linting"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          check-latest: true
          cache: 'npm'
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
        
      - name: Install dependencies npm
        working-directory: ${{ matrix.component }}
        run: npm install

      - name: Install dependencies ci
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint

# or
# run: cd frontend && npx eslint src/ --ext .js,.jsx

  # Stage 2 - SCA security Scan Stage
  sca:
    name: "SCA dependency audit"
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          check-latest: true
          cache: 'npm'
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"
      
      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci
      
      # npm audit for known vulnerabilities (faile on high/critical)
      - name: Audit dependencies
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true
        # `|| true` to not fail on moderate — need to adjust in prod

# Stage 3 - Build & Push Container image
  build:
    name: "Build and Push Container Image"
    needs: sca
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GitHub Packages to GHCR
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/blogapp-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Security: Provenance and SBOM
          provenance: true
          sbom: true

# Stage 4 - Vulnerability Scan of Container Images
  image-scan:
    name: "Scan ${{ matrix.component }} Image"
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        run: |
          docker build -t blogapp-${{ matrix.component }}:scan /${{ matrix.component }}
      
      - name: Set up Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "blogapp-${{ matrix.component }}:scan"
          format: 'table'
          output: 'trivy-results-${{ matrix.component }}.txt'
          exit-code: 1
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: 'CRITICAL,HIGH'
          timeout: 10m

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ matrix.component }}
          path: trivy-results-${{ matrix.component }}.txt

#Stage 5 - IaC Security Scan (Checkov) - Terraform + K8s
  iac-scan:
    name: "IaC Security Scan"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_39,CKV_AWS_58  # Public EKS endpoint (intentional for dev)
          output_format: cli

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true  # Soft fail for K8s (some checks may not apply)
          output_format: cli

# Stage 6 - Dockerfile (Hadolint)

  dockerfile-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning

  # Stage 7 - Secret Scan (GitLeaks)
  secret-scan:
    name: "🔒 Secret Scan"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        with:
          scan: '--log-level=debug'
          verbose: true
          no-banner: true
  
  # STAGE 8: Update K8s Manifest with New Image Tag
  # Only runs on push to main (not on PRs)
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' 
    permissions:
      contents: write # Needed to push manifest changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update K8s manifest with new image tags
        run: |
          IMAGE_TAG=${{ steps.sha.outputs.short }}

          # Find the line number of the backend container image
          # (the image: line right after `- name: backend`)
          BACKEND_LINE=$(awk '/- name: backend/{found=1} found && /image:/{print NR; exit}' k8s/jerney.yaml)
          echo "Backend image at line: ${BACKEND_LINE}"
          sed -i "${BACKEND_LINE}s|.*|          image: ${BACKEND_IMAGE}:${IMAGE_TAG}|" k8s/jerney.yaml

          # Find the line number of the frontend container image
          # (the image: line right after `- name: frontend`)
          FRONTEND_LINE=$(awk '/- name: frontend/{found=1} found && /image:/{print NR; exit}' k8s/jerney.yaml)
          echo "Frontend image at line: ${FRONTEND_LINE}"
          sed -i "${FRONTEND_LINE}s|.*|          image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|" k8s/jerney.yaml

          echo "✅ Updated images to tag: ${IMAGE_TAG}"
          grep -n "image:" k8s/jerney.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
  


